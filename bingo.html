<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraception Matching Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
        }
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .drop-zone.over {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.02);
        }
        .correct {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            pointer-events: none;
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Header -->
    <header class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold text-blue-600 mb-2">Contraception Bingo</h1>
        <p class="text-gray-600 text-lg">Match the method name to the correct image!</p>
    </header>

    <main class="w-full max-w-5xl flex flex-col md:flex-row gap-8 items-start">
        
        <!-- Term Dock (Left) -->
        <section class="w-full md:w-1/3 bg-white p-6 rounded-3xl shadow-xl border-4 border-blue-100">
            <h2 class="text-xl font-semibold mb-4 text-blue-500 border-b-2 border-blue-50 pb-2">Methods</h2>
            <div id="term-dock" class="flex flex-wrap md:flex-col gap-3">
                <!-- Terms will be injected here -->
            </div>
        </section>

        <!-- Bingo Board (Center/Right) -->
        <section class="w-full md:w-2/3 bg-white p-6 rounded-3xl shadow-xl border-4 border-purple-100">
            <div id="bingo-board" class="bingo-grid">
                <!-- Grid items will be injected here -->
            </div>
        </section>

    </main>

    <!-- Celebration Overlay (Hidden by default) -->
    <div id="win-screen" class="fixed inset-0 bg-blue-600/90 hidden flex-col items-center justify-center z-50 text-white p-6">
        <h2 class="text-6xl font-bold mb-4">BINGO!</h2>
        <p class="text-2xl mb-8 text-center">You've mastered the contraception methods!</p>
        <button onclick="window.location.reload()" class="bg-white text-blue-600 px-8 py-4 rounded-full font-bold text-xl hover:bg-blue-50 transition-colors shadow-lg">
            Play Again
        </button>
    </div>

    <script>
        const METHODS = [
            { 
                id: 'h-iud', name: 'Hormonal IUD', 
                img: './images/hormonal-iud.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><path d="M20 30 Q50 40 80 30" fill="none" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/><line x1="50" y1="35" x2="50" y2="80" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/><rect x="44" y="45" width="12" height="25" rx="4" fill="#3b82f6"/></svg>` 
            },
            { 
                id: 'c-iud', name: 'Copper IUD', 
                img: './images/copper-iud.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><path d="M20 30 Q50 40 80 30" fill="none" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/><line x1="50" y1="35" x2="50" y2="80" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/><line x1="45" y1="45" x2="55" y2="45" stroke="#d97706" stroke-width="4"/><line x1="45" y1="52" x2="55" y2="52" stroke="#d97706" stroke-width="4"/><line x1="45" y1="59" x2="55" y2="59" stroke="#d97706" stroke-width="4"/><line x1="45" y1="66" x2="55" y2="66" stroke="#d97706" stroke-width="4"/></svg>` 
            },
            { 
                id: 'pill', name: 'The Pill', 
                img: './images/pill.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><rect x="20" y="10" width="60" height="80" rx="10" fill="#fce7f3" stroke="#f472b6" stroke-width="4"/><circle cx="35" cy="25" r="7" fill="#f472b6"/><circle cx="65" cy="25" r="7" fill="#f472b6"/><circle cx="35" cy="50" r="7" fill="#f472b6"/><circle cx="65" cy="50" r="7" fill="#f472b6"/><circle cx="35" cy="75" r="7" fill="#f472b6"/><circle cx="65" cy="75" r="7" fill="#f472b6"/></svg>` 
            },
            { 
                id: 'ring', name: 'Vaginal Ring', 
                img: './images/ring.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><circle cx="50" cy="50" r="35" fill="none" stroke="#a855f7" stroke-width="12" opacity="0.6"/><circle cx="50" cy="50" r="35" fill="none" stroke="#d8b4fe" stroke-width="6"/></svg>` 
            },
            { 
                id: 'implant', name: 'Implant', 
                img: './images/implant.webp',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><rect x="42" y="20" width="16" height="60" rx="8" fill="#2dd4bf"/><path d="M47 25 L53 25 M47 75 L53 75" stroke="#14b8a6" stroke-width="2"/></svg>` 
            },
            { 
                id: 'shot', name: 'Shot', 
                img: './images/shot.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md" transform="rotate(45)"><rect x="40" y="20" width="20" height="50" rx="2" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/><rect x="35" y="15" width="30" height="5" fill="#38bdf8"/><rect x="48" y="70" width="4" height="20" fill="#94a3b8"/><rect x="45" y="5" width="10" height="10" fill="#bae6fd"/><line x1="40" y1="35" x2="48" y2="35" stroke="#38bdf8" stroke-width="2"/><line x1="40" y1="45" x2="48" y2="45" stroke="#38bdf8" stroke-width="2"/><line x1="40" y1="55" x2="48" y2="55" stroke="#38bdf8" stroke-width="2"/></svg>` 
            },
            { 
                id: 'patch', name: 'Patch', 
                img: './images/patch.webp',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><rect x="25" y="25" width="50" height="50" rx="8" fill="#fde68a" stroke="#fbbf24" stroke-width="2"/><rect x="32" y="32" width="36" height="36" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/></svg>` 
            },
            { 
                id: 'condoms', name: 'Condoms', 
                img: './images/condoms.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><rect x="25" y="25" width="50" height="50" rx="5" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/><circle cx="50" cy="50" r="15" fill="#fca5a5"/><circle cx="50" cy="50" r="10" fill="#fecaca"/></svg>` 
            },
            { 
                id: 'cap', name: 'Cervical Cap', 
                img: './images/cap.jpg',
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><path d="M25 60 Q50 20 75 60" fill="#f9a8d4" stroke="#ec4899" stroke-width="4"/><path d="M20 60 L80 60" stroke="#ec4899" stroke-width="6" stroke-linecap="round"/><path d="M45 60 Q50 80 55 60" fill="none" stroke="#ec4899" stroke-width="4"/></svg>` 
            }
        ];

        let matchedCount = 0;

        function initGame() {
            const dock = document.getElementById('term-dock');
            const board = document.getElementById('bingo-board');

            // Shuffle data
            const shuffledBoard = [...METHODS].sort(() => Math.random() - 0.5);
            const shuffledTerms = [...METHODS].sort(() => Math.random() - 0.5);

            // Create Terms (Draggable)
            shuffledTerms.forEach(method => {
                const term = document.createElement('div');
                term.className = 'bg-blue-500 text-white px-4 py-3 rounded-2xl cursor-grab active:cursor-grabbing font-semibold text-center shadow hover:bg-blue-600 transition-all select-none';
                term.draggable = true;
                term.innerText = method.name;
                term.dataset.id = method.id;
                
                term.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', method.id);
                    term.classList.add('opacity-50');
                });

                term.addEventListener('dragend', () => term.classList.remove('opacity-50'));
                dock.appendChild(term);
            });

            // Create Grid Slots
            shuffledBoard.forEach(method => {
                const slot = document.createElement('div');
                slot.className = 'drop-zone relative bg-gray-50 border-4 border-dashed border-gray-200 rounded-2xl p-4 flex flex-col items-center justify-center aspect-square transition-all duration-300 overflow-hidden';
                slot.dataset.id = method.id;

                const imgElement = document.createElement('img');
                imgElement.src = method.img;
                imgElement.alt = "Contraception Method";
                imgElement.className = 'w-full h-full object-contain pointer-events-none rounded-lg';
                
                // Fallback to SVG if the image fails to load
                imgElement.onerror = function() {
                    const iconWrapper = document.createElement('div');
                    iconWrapper.className = 'w-20 h-20 md:w-24 md:h-24 pointer-events-none flex items-center justify-center';
                    iconWrapper.innerHTML = method.svg;
                    slot.replaceChild(iconWrapper, imgElement);
                };
                
                slot.appendChild(imgElement);

                // Drag Events
                slot.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    slot.classList.add('over');
                });

                slot.addEventListener('dragleave', () => slot.classList.remove('over'));

                slot.addEventListener('drop', (e) => {
                    e.preventDefault();
                    slot.classList.remove('over');
                    const draggedId = e.dataTransfer.getData('text/plain');

                    if (draggedId === slot.dataset.id) {
                        handleMatch(draggedId, slot);
                    } else {
                        handleMiss(slot);
                    }
                });

                board.appendChild(slot);
            });
        }

        function handleMatch(id, slot) {
            const termElement = document.querySelector(`[data-id="${id}"]`);
            termElement.classList.add('invisible'); // Hide from dock
            
            slot.classList.add('correct');
            
            // Overlay the success label instead of replacing the image
            const label = document.createElement('div');
            label.className = 'absolute bottom-2 left-2 right-2 bg-green-100 text-green-700 text-sm font-bold py-1 px-2 rounded shadow text-center border border-green-300';
            label.innerHTML = `✅ ${METHODS.find(m => m.id === id).name}`;
            slot.appendChild(label);
            
            matchedCount++;
            if (matchedCount === METHODS.length) {
                triggerWin();
            }
        }

        function handleMiss(slot) {
            slot.classList.add('shake', 'border-red-400');
            setTimeout(() => {
                slot.classList.remove('shake', 'border-red-400');
            }, 500);
        }

        function triggerWin() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            setTimeout(() => {
                document.getElementById('win-screen').classList.remove('hidden');
                document.getElementById('win-screen').classList.add('flex');
            }, 1000);
        }

        initGame();
    </script>
</body>
</html>
